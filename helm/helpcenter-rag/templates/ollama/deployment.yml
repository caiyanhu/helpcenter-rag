apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helpcenter-rag.fullname" . }}-ollama
  namespace: {{ include "helpcenter-rag.namespace" . }}
  labels:
    {{- include "helpcenter-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: {{ .Values.ollama.replicas }}
  strategy:
    type: {{ .Values.ollama.strategy.type }}
  selector:
    matchLabels:
      {{- include "helpcenter-rag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "helpcenter-rag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      containers:
        - name: ollama
          image: {{ include "helpcenter-rag.image" (dict "image" .Values.ollama.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ollama.service.port }}
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            {{- if .Values.ollama.persistence.enabled }}
            - name: ollama-models
              mountPath: /root/.ollama
            {{- end }}
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          {{- if .Values.ollama.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: {{ .Values.ollama.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ollama.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.ollama.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: {{ .Values.ollama.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ollama.readinessProbe.periodSeconds }}
          {{- end }}
      volumes:
        {{- if .Values.ollama.persistence.enabled }}
        - name: ollama-models
          persistentVolumeClaim:
            claimName: {{ include "helpcenter-rag.fullname" . }}-ollama-models
        {{- end }}
