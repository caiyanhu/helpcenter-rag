apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helpcenter-rag.fullname" . }}-frontend-nginx-config
  namespace: {{ include "helpcenter-rag.namespace" . }}
  labels:
    {{- include "helpcenter-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
