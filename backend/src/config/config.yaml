embedding:
  provider: ollama
  model: bge-m3
  baseUrl: http://localhost:11434

llm:
  provider: deepseek
  model: deepseek-chat
  baseUrl: https://api.deepseek.com/v1
  apiKey: ''

retrieval:
  topK: 20
  similarityThreshold: 0.6
  finalK: 5

reranker:
  provider: cross-encoder
  model: Xenova/bge-reranker-base

queryRewrite:
  enabled: true
  minQueryLength: 10
  semanticRewrite: true
