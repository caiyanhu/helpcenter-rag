embedding:
  provider: ollama
  model: bge-m3
  baseUrl: http://localhost:11434

llm:
  # 兼容任何 OpenAI 协议接口的 LLM（DeepSeek、智谱 AI、Azure OpenAI 等）
  # 只需修改 baseUrl 和 model 即可切换不同提供商
  provider: deepseek
  model: deepseek-chat
  baseUrl: https://api.deepseek.com/v1
  # apiKey 请通过环境变量传入，不要硬编码
  # 支持的环境变量：DEEPSEEK_API_KEY、ZHIPUAI_API_KEY
  apiKey: ''

mmr:
  enabled: true
  fetchK: 20
  lambda: 0.5

retrieval:
  topK: 20
  similarityThreshold: 0.7
  finalK: 10

reranker:
  provider: cross-encoder
  model: Xenova/bge-reranker-base

hybrid:
  enabled: false  # 默认关闭，需要重新索引后才可开启
  rrfK: 60

queryRewrite:
  enabled: true
  minQueryLength: 10
  semanticRewrite: true
