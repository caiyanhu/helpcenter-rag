embedding:
  provider: ollama
  model: bge-m3
  baseUrl: http://localhost:11434

llm:
  provider: deepseek
  model: deepseek-chat
  baseUrl: https://api.deepseek.com/v1
  # 注意：apiKey 请通过环境变量 DEEPSEEK_API_KEY 传入，不要硬编码
  apiKey: ''

mmr:
  enabled: true
  fetchK: 20
  lambda: 0.5

retrieval:
  topK: 20
  similarityThreshold: 0.7
  finalK: 10

reranker:
  provider: cross-encoder
  model: Xenova/bge-reranker-base

hybrid:
  enabled: false  # 默认关闭，需要重新索引后才可开启
  rrfK: 60

queryRewrite:
  enabled: true
  minQueryLength: 10
  semanticRewrite: true
